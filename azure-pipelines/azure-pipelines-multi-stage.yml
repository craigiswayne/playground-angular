trigger:
  branches:
    include:
      - feature/azure-static-web-app

pr:
  branches:
    include:
      - '*'

variables:
  - name: APP_NAME
    value: 'playground-angular'
  - name: ARTIFACT_NAME
    value: '$(Build.Repository.Name)_$(Build.SourceBranchName)_$(Build.BuildNumber)'
  #   defined in the Pipeline Library variable group
  #   see: https://learn.microsoft.com/en-us/azure/devops/pipelines/library/variable-groups?view=azure-devops&tabs=yaml
  - group: DEPLOYMENT_TOKENS

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: Build
    displayName: 'Build and Test'
    jobs:
      - job: Build
        displayName: 'Build'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '14.21.3'
            displayName: 'Install Node.js'
          - script: |
              npm ci
              ng build --prod
              npm run test:ci
            displayName: 'Build and Test'

  - stage: Deploy
    displayName: 'Deploy to Azure Static Web Apps'
    dependsOn: Build
    jobs:
      - deployment: Deploy
        displayName: 'Deploy'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureStaticWebApp@0
                  inputs:
                    appName: 'MyAzureStaticWebApp'
                    azure_static_web_apps_api_token: $(PLAYGROUND_ANGULAR_DEPLOYMENT_TOKEN)
