trigger:
  branches:
    include:
      - feature/azure-static-web-app

pr:
  branches:
    include:
      - '*'

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: Build
    displayName: 'Build and Test'
    jobs:
      - job: Build
        displayName: 'Build'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '14.21.3'
            displayName: 'Install Node.js'
          - script: |
              npm ci
              ng build --prod
              npm run test:ci
            displayName: 'Build and Test'

  - stage: Deploy
    displayName: 'Deploy to Azure Static Web Apps'
    dependsOn: Build
    jobs:
      - deployment: Deploy
        displayName: 'Deploy'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureStaticWebApp@0
                  inputs:
                    appName: 'MyAzureStaticWebApp'
                    azureStaticWebAppsApiToken: $(PLAYGROUND_ANGULAR_DEPLOYMENT_TOKEN)
